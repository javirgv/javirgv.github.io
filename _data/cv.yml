        summary: Final-year research project combining astronomical image data, supervised machine learning, and scientific Python workflows.
        highlights:
          - "Developing supervised machine learning methods to classify galaxy morphologies from small ground-based telescope imaging data."
          - "Training and evaluating convolutional neural networks using SDSS and Galaxy Zoo 2 data."
          - "Testing model transfer to smaller ground-based telescope observations, including Calar Alto-style imaging data."
          - "Applying data preprocessing, feature extraction, model evaluation, confidence analysis, and reproducible project organisation."
          - "Supervisor: Dr Antonio Martin-Carrillo."

