        summary: Summer research project analysing ESO ERIS/VLT integral-field spectroscopic data of protostellar jets from the T Tauri star DG Tau.
        highlights:
          - "Analysed ESO ERIS/VLT IFU FITS data of protostellar jets, identifying emission features and characterising jet velocity layers."
          - "Compared observational results with magnetohydrodynamic disk-wind models."
          - "Developed Python-based workflows for processing, analysing, and visualising spectroscopic data."
          - "Presented research findings to academic audiences."
